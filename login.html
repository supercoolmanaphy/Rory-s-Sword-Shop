<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="images/sword5.jpg">
  <title>Admin Sign In — Rory's Sword Shop</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      padding: 20px;
      max-width: 400px;
      margin: 60px auto;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .sign-in-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .sign-in-btn:hover {
      background-color: #000;
    }

    .sign-out-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .sign-out-btn:hover {
      background-color: #c82333;
    }

    #error-msg {
      margin-top: 12px;
      color: #dc3545;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    #signed-in-view {
      display: none;
      text-align: center;
    }

    #signed-in-view p {
      margin: 0 0 15px;
      font-size: 15px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #333;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">

    <div id="sign-in-view">
      <h2>Admin Sign In</h2>
      <button class="sign-in-btn" id="sign-in-btn">Sign in with Google</button>
      <p id="error-msg"></p>
    </div>

    <div id="signed-in-view">
      <h2>Signed In</h2>
      <p id="signed-in-email"></p>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
    </div>

    <a href="index.html" class="back-link">← Back to Shop</a>
  </div>
</div>

<script type="module">
  import { auth, ADMIN_EMAIL } from './firebase.js';
  import {
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const signInView = document.getElementById('sign-in-view');
  const signedInView = document.getElementById('signed-in-view');
  const signInBtn = document.getElementById('sign-in-btn');
  const signOutBtn = document.getElementById('sign-out-btn');
  const errorMsg = document.getElementById('error-msg');
  const signedInEmail = document.getElementById('signed-in-email');

  // Redirect destination after sign-in (supports ?next= query param).
  // Validated to be same-origin to prevent open-redirect attacks.
  function getSafeNext(raw) {
    try {
      const url = new URL(raw, window.location.origin);
      if (url.origin === window.location.origin) return url.pathname + url.search + url.hash;
    } catch {}
    return 'index.html';
  }
  const params = new URLSearchParams(window.location.search);
  const nextUrl = getSafeNext(params.get('next') || 'index.html');

  onAuthStateChanged(auth, (user) => {
    if (user) {
      signInView.style.display = 'none';
      signedInView.style.display = 'block';
      signedInEmail.textContent = `Signed in as ${user.email}`;
    } else {
      signInView.style.display = 'block';
      signedInView.style.display = 'none';
    }
  });

  signInBtn.addEventListener('click', async () => {
    errorMsg.textContent = '';
    signInBtn.disabled = true;
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: ADMIN_EMAIL });
    try {
      const result = await signInWithPopup(auth, provider);
      if (result.user.email !== ADMIN_EMAIL) {
        await signOut(auth);
        errorMsg.textContent = 'Access denied. Only the admin account can sign in.';
        signInBtn.disabled = false;
        return;
      }
      window.location.href = nextUrl;
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
        errorMsg.textContent = 'Sign-in failed. Please try again.';
      }
      signInBtn.disabled = false;
    }
  });

  signOutBtn.addEventListener('click', async () => {
    await signOut(auth);
  });
</script>

<script src="cursor.js"></script>
</body>
</html>
