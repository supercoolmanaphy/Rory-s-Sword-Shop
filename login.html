<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="images/sword5.jpg">
  <title>Admin Sign In — Rory's Sword Shop</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      padding: 20px;
      max-width: 400px;
      margin: 60px auto;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .sign-in-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .sign-in-btn:hover {
      background-color: #000;
    }

    .sign-out-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .sign-out-btn:hover {
      background-color: #c82333;
    }

    #error-msg {
      margin-top: 12px;
      color: #dc3545;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    #signed-in-view {
      display: none;
      text-align: center;
    }

    #signed-in-view p {
      margin: 0 0 15px;
      font-size: 15px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #333;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">

    <div id="sign-in-view">
      <h2>Admin Sign In</h2>
      <div id="sign-in-btn" style="margin-top:20px;display:flex;justify-content:center;"></div>
      <p id="error-msg"></p>
    </div>

    <div id="signed-in-view">
      <h2>Signed In</h2>
      <p id="signed-in-email"></p>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
    </div>

    <a href="index.html" class="back-link">← Back to Shop</a>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
  import { ADMIN_EMAIL } from './admin-config.js';

  function getSafeNext(raw) {
    try {
      const url = new URL(raw, window.location.origin);
      if (url.origin === window.location.origin) return url.pathname + url.search + url.hash;
    } catch {}
    return 'index.html';
  }
  const params = new URLSearchParams(window.location.search);
  const nextUrl = getSafeNext(params.get('next') || 'index.html');

  const signInView = document.getElementById('sign-in-view');
  const signedInView = document.getElementById('signed-in-view');
  const signOutBtn = document.getElementById('sign-out-btn');
  const signedInEmail = document.getElementById('signed-in-email');
  const errorMsg = document.getElementById('error-msg');

  function showSignedIn(email) {
    signInView.style.display = 'none';
    signedInView.style.display = 'block';
    signedInEmail.textContent = `Signed in as ${email}`;
  }

  function showSignedOut() {
    signInView.style.display = 'block';
    signedInView.style.display = 'none';
  }

  const storedEmail = sessionStorage.getItem('adminEmail');
  if (sessionStorage.getItem('adminVerified') === 'true' && storedEmail) {
    showSignedIn(storedEmail);
  } else {
    showSignedOut();
  }

  function handleCredential(response) {
    const base64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    const payload = JSON.parse(atob(base64));
    if (payload.email !== ADMIN_EMAIL) {
      errorMsg.textContent = 'Access denied. Only the admin account can sign in.';
      return;
    }
    sessionStorage.setItem('adminVerified', 'true');
    sessionStorage.setItem('adminEmail', payload.email);
    window.location.href = nextUrl;
  }

  window.addEventListener('load', () => {
    google.accounts.id.initialize({
      // Replace with your OAuth 2.0 Client ID from https://console.cloud.google.com/
      client_id: '907004463603-0lnskbqdkp84tmlsr3ifgq0hnfeshqta.apps.googleusercontent.com',
      callback: handleCredential
    });
    google.accounts.id.renderButton(
      document.getElementById('sign-in-btn'),
      { type: 'standard', text: 'sign_in_with', theme: 'outline', size: 'large', width: 340 }
    );
  });

  signOutBtn.addEventListener('click', () => {
    sessionStorage.removeItem('adminVerified');
    sessionStorage.removeItem('adminEmail');
    showSignedOut();
  });
</script>

<script src="cursor.js"></script>
</body>
</html>
