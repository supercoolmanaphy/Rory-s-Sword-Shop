<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="images/sword5.jpg">
  <title>Admin Sign In — Rory's Sword Shop</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      padding: 20px;
      max-width: 400px;
      margin: 60px auto;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .sign-in-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .sign-in-btn:hover {
      background-color: #000;
    }

    .sign-out-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .sign-out-btn:hover {
      background-color: #c82333;
    }

    #error-msg {
      margin-top: 12px;
      color: #dc3545;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    #signed-in-view {
      display: none;
      text-align: center;
    }

    #signed-in-view p {
      margin: 0 0 15px;
      font-size: 15px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #333;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">

    <div id="sign-in-view">
      <h2>Admin Sign In</h2>
      <label for="password-input" style="display:block;margin-top:20px;font-size:14px;color:#555;">Password</label>
      <input type="password" id="password-input" placeholder="Enter admin password" aria-label="Admin password" style="width:100%;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:5px;box-sizing:border-box;">
      <button class="sign-in-btn" id="sign-in-btn">Sign In</button>
      <p id="error-msg"></p>
    </div>

    <div id="signed-in-view">
      <h2>Signed In</h2>
      <p id="signed-in-email"></p>
      <button class="sign-out-btn" id="sign-out-btn">Sign Out</button>
    </div>

    <a href="index.html" class="back-link">← Back to Shop</a>
  </div>
</div>

<script type="module">
  import { ADMIN_EMAIL, ADMIN_PASSWORD_HASH } from './admin-config.js';

  function getSafeNext(raw) {
    try {
      const url = new URL(raw, window.location.origin);
      if (url.origin === window.location.origin) return url.pathname + url.search + url.hash;
    } catch {}
    return 'index.html';
  }
  const params = new URLSearchParams(window.location.search);
  const nextUrl = getSafeNext(params.get('next') || 'index.html');

  const signInView = document.getElementById('sign-in-view');
  const signedInView = document.getElementById('signed-in-view');
  const signOutBtn = document.getElementById('sign-out-btn');
  const signedInEmail = document.getElementById('signed-in-email');
  const errorMsg = document.getElementById('error-msg');
  const passwordInput = document.getElementById('password-input');
  const signInBtn = document.getElementById('sign-in-btn');

  function showSignedIn(email) {
    signInView.style.display = 'none';
    signedInView.style.display = 'block';
    signedInEmail.textContent = `Signed in as ${email}`;
  }

  function showSignedOut() {
    signInView.style.display = 'block';
    signedInView.style.display = 'none';
  }

  const storedEmail = sessionStorage.getItem('adminEmail');
  if (sessionStorage.getItem('adminVerified') === 'true' && storedEmail) {
    showSignedIn(storedEmail);
  } else {
    showSignedOut();
  }

  async function sha256hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function handleSignIn() {
    const hash = await sha256hex(passwordInput.value);
    if (hash !== ADMIN_PASSWORD_HASH) {
      errorMsg.textContent = 'Incorrect password.';
      return;
    }
    sessionStorage.setItem('adminVerified', 'true');
    sessionStorage.setItem('adminEmail', ADMIN_EMAIL);
    window.location.href = nextUrl;
  }

  signInBtn.addEventListener('click', handleSignIn);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });

  signOutBtn.addEventListener('click', () => {
    sessionStorage.removeItem('adminVerified');
    sessionStorage.removeItem('adminEmail');
    showSignedOut();
  });
</script>

<script src="cursor.js"></script>
</body>
</html>
