<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bronze Axe Head</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .product-page {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      margin-top: 0;
    }

    .main-img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .gallery {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .gallery img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .back {
      display: inline-block;
      margin-bottom: 15px;
      text-decoration: none;
      color: blue;
    }

    .add-to-cart {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    .add-to-cart:hover {
      background-color: #218838;
    }

    #description {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back">← Back to Shop</a>

  <div class="product-page">
    <h1>Bronze Axe Head</h1>
    <img src="images/sword4.jpg" class="main-img">

    <p><strong>Price:</strong> $75.00</p>

    <h3>Product Description</h3>
    <p id="description">
      A beautifully crafted bronze axe head, ideal for collectors, historical displays, or reenactments. Each piece reflects authentic craftsmanship and historical accuracy, making it a standout addition to any collection.
    </p>

    <button class="add-to-cart">Add to Cart</button>

    <h3>More Images</h3>
    <div class="gallery">
      <img src="images/sword4.jpg">
      <img src="images/sword4.jpg">
      <img src="images/sword4.jpg">
    </div>
  </div>
</div>

<script>
  const mainImg = document.querySelector('.main-img');
  const galleryImgs = document.querySelectorAll('.gallery img');

  galleryImgs.forEach(img => {
    img.addEventListener('click', () => {
      mainImg.src = img.src;
    });
  });
</script>

</body>
</html>
