<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="images/sword5.jpg">
  <title>Bronze Knife</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      position: relative;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      background-image: url('images/background.jpg');
      background-size: cover;
      background-position: center;
      z-index: -1;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .product-page {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      margin-top: 0;
    }

    .main-img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
    }

    .gallery {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .gallery img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .back {
      display: inline-block;
      text-decoration: none;
      color: blue;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .cart-link {
      text-decoration: none;
      color: #333;
      font-size: 16px;
    }

    .cart-link:hover {
      color: #000;
    }

    .add-to-cart {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    .add-to-cart:hover {
      background-color: #218838;
    }

    .add-to-cart.in-cart {
      background-color: #6c757d;
    }

    .add-to-cart.in-cart:hover {
      background-color: #5a6268;
    }

    #description {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="nav-bar">
    <a href="index.html" class="back">← Back to Shop</a>
    <a href="checkout.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
  </div>

  <div class="product-page">
    <h1>Bronze Knife</h1>
    <img src="images/sword3.jpg" class="main-img">

    <p><strong>Price:</strong> $75.00</p>

    <h3>Product Description</h3>
    <p id="description">
      A finely crafted bronze knife, perfect for collectors, historical displays, or reenactments. Showcases detailed workmanship and authentic design, adding a touch of history to your collection.
    </p>

    <button class="add-to-cart">Add to Cart</button>

    <h3>More Images</h3>
    <div class="gallery">
      <img src="images/sword3.jpg">
      <img src="images/sword3.jpg">
      <img src="images/sword3.jpg">
    </div>
  </div>
</div>

<script src="cart.js"></script>
<script>
  const PRODUCT = { id: 'product3', name: 'Bronze Knife', price: 75.00, image: 'images/sword3.jpg' };

  const btn = document.querySelector('.add-to-cart');
  const cartCount = document.getElementById('cart-count');

  const mainImg = document.querySelector('.main-img');
  const galleryImgs = document.querySelectorAll('.gallery img');
  galleryImgs.forEach(img => {
    img.addEventListener('click', () => { mainImg.src = img.src; });
  });

  function updateCartCount() { cartCount.textContent = getCart().length; }

  function updateBtn() {
    const inCart = getCart().some(i => i.id === PRODUCT.id);
    if (inCart) {
      btn.textContent = '✓ In Cart — Remove';
      btn.classList.add('in-cart');
    } else {
      btn.textContent = 'Add to Cart';
      btn.classList.remove('in-cart');
    }
  }

  btn.addEventListener('click', () => {
    let cart = getCart();
    if (cart.some(i => i.id === PRODUCT.id)) {
      cart = cart.filter(i => i.id !== PRODUCT.id);
    } else {
      cart.push(PRODUCT);
    }
    saveCart(cart);
    updateBtn();
    updateCartCount();
  });

  updateBtn();
  updateCartCount();
</script>

</body>
<script src="cursor.js"></script>
</html>
