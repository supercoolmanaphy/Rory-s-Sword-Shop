<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="images/sword5.jpg">
  <title>Sword Slash Game – Rory's Sword Shop</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #1a1a2e;
      color: white;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 30px;
      position: relative;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #222;
    }

    .back {
      text-decoration: none;
      color: #aaa;
      font-size: 16px;
    }

    .back:hover { color: white; }

    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #hud {
      display: flex;
      gap: 40px;
      font-size: 22px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.07);
      padding: 10px 30px;
      border-radius: 10px;
    }

    #game-canvas {
      border: 3px solid #555;
      border-radius: 12px;
      background: #0d0d1a;
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #overlay h2 {
      font-size: 36px;
      margin: 0;
      text-shadow: 0 0 12px #4caf50;
    }

    #overlay p {
      font-size: 20px;
      margin: 0;
      color: #ccc;
    }

    #start-btn, #restart-btn {
      background-color: green;
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
    }

    #start-btn:hover, #restart-btn:hover {
      background-color: darkgreen;
    }

    #canvas-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <header>Rory's Sword Shop</header>

  <div class="nav-bar">
    <a href="index.html" class="back">← Back to Shop</a>
    <span style="color:#aaa; font-size:16px;">⚔️ Sword Slash</span>
  </div>

  <div id="game-wrapper">
    <div id="hud">
      <span>⚔️ Score: <strong id="score-display">0</strong>/50</span>
      <span>❤️ Lives: <strong id="lives-display">3</strong></span>
      <span>🎖 Rank: <strong id="diff-display">Novice</strong></span>
    </div>

    <div id="canvas-container">
      <canvas id="game-canvas" width="700" height="450"></canvas>
      <div id="overlay">
        <h2>⚔️ Sword Slash</h2>
        <p>Click swords to score – reach <strong>50 points</strong> to win!</p>
        <p style="font-size:15px; color:#888;">Harder swords appear as you level up. Beware the 🔥 fire sword – clicking it costs a life!</p>
        <button id="start-btn">▶ Start Game</button>
      </div>
    </div>
  </div>

  <script src="cursor.js"></script>
  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score-display');
    const livesEl = document.getElementById('lives-display');
    const diffEl  = document.getElementById('diff-display');
    const startBtn = document.getElementById('start-btn');

    const WIN_SCORE  = 50;
    const SWORD_SIZE = 36;

    const DIFF_RANKS = ['Novice', 'Apprentice', 'Warrior', 'Knight', 'Champion', 'Master', 'Legend'];

    // Sword tiers: grey → green → blue → purple → yellow → orange → teal (least → most difficult)
    const SWORD_TIERS = [
      { color: '#9e9e9e', minLife: 2500, maxLife: 3500, points: 1, unlockAt: 0  },
      { color: '#2ecc71', minLife: 1900, maxLife: 2700, points: 2, unlockAt: 5  },
      { color: '#3498db', minLife: 1400, maxLife: 2000, points: 3, unlockAt: 10 },
      { color: '#9b59b6', minLife: 1100, maxLife: 1600, points: 4, unlockAt: 15 },
      { color: '#f1c40f', minLife:  850, maxLife: 1300, points: 5, unlockAt: 20 },
      { color: '#e67e22', minLife:  650, maxLife: 1000, points: 6, unlockAt: 27 },
      { color: '#1abc9c', minLife:  480, maxLife:  800, points: 7, unlockAt: 35 },
    ];

    let score = 0, lives = 3;
    let targets = [], particles = [];
    let gameRunning = false;
    let spawnInterval = null, animFrame = null;

    function randomBetween(a, b) { return Math.random() * (b - a) + a; }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getAvailableTiers() {
      return SWORD_TIERS.filter(t => score >= t.unlockAt);
    }

    function updateDiffDisplay() {
      const level = Math.max(1, getAvailableTiers().length);
      diffEl.textContent = DIFF_RANKS[level - 1] || 'Legend';
    }

    function spawnTarget() {
      const margin = SWORD_SIZE + 10;
      // Fire sword chance scales with score: starts at 8%, caps at 20%
      const fireChance = Math.min(0.20, 0.08 + score * 0.003);
      if (Math.random() < fireChance) {
        targets.push({
          x: randomBetween(margin, canvas.width  - margin),
          y: randomBetween(margin, canvas.height - margin),
          isFire: true,
          born: Date.now(),
          lifetime: randomBetween(1500, 2800),
          hit: false,
          scale: 0,
        });
        return;
      }
      const available = getAvailableTiers();
      const tier = available[Math.floor(Math.random() * available.length)];
      targets.push({
        x: randomBetween(margin, canvas.width  - margin),
        y: randomBetween(margin, canvas.height - margin),
        color: tier.color,
        points: tier.points,
        born: Date.now(),
        lifetime: randomBetween(tier.minLife, tier.maxLife),
        hit: false,
        scale: 0,
        isFire: false,
      });
    }

    // ---------- drawing helpers ----------

    function drawTimerIndicator(x, y, color, progress) {
      if (progress <= 0) return;
      ctx.save();
      const r = SWORD_SIZE * 0.95;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.arc(x, y, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress, false);
      ctx.closePath();
      ctx.fillStyle = hexToRgba(color, 0.38);
      ctx.fill();
      ctx.restore();
    }

    function drawSword(x, y, color, scale) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);
      ctx.scale(scale, scale);
      const s = SWORD_SIZE;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(4, s * 0.4);
      ctx.lineTo(-4, s * 0.4);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.beginPath();
      ctx.rect(-s * 0.4, s * 0.35, s * 0.8, 7);
      ctx.fillStyle = '#bdc3c7';
      ctx.shadowBlur = 0;
      ctx.fill();
      ctx.beginPath();
      ctx.rect(-5, s * 0.42, 10, s * 0.4);
      ctx.fillStyle = '#7f5539';
      ctx.fill();
      ctx.restore();
    }

    function drawFireSword(x, y, scale) {
      const t = Date.now() / 150;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);
      ctx.scale(scale, scale);
      const s = SWORD_SIZE;
      // Animated flame particles above blade tip
      for (let i = 0; i < 7; i++) {
        const fi = i / 7;
        const flameY = -s - 8 - (18 + 12 * Math.abs(Math.sin(t * 1.1 + fi * Math.PI * 1.7)));
        const flameX = Math.sin(t * 1.5 + fi * 2.3) * 6;
        const flameR = Math.max(1, 7 - fi * 5 + 2 * Math.sin(t * 0.9 + fi));
        const alpha  = 0.9 - fi * 0.1;
        const green  = Math.max(0, Math.floor(180 - fi * 180));
        ctx.beginPath();
        ctx.arc(flameX, flameY, flameR, 0, Math.PI * 2);
        ctx.fillStyle   = `rgba(255, ${green}, 0, ${alpha})`;
        ctx.shadowColor = '#ff6600';
        ctx.shadowBlur  = 12;
        ctx.fill();
      }
      // Dark blade with pulsing orange glow
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(4, s * 0.4);
      ctx.lineTo(-4, s * 0.4);
      ctx.closePath();
      ctx.fillStyle   = '#1c1c1c';
      ctx.shadowColor = '#ff4500';
      ctx.shadowBlur  = 18 + 8 * Math.sin(t);
      ctx.fill();
      ctx.beginPath();
      ctx.rect(-s * 0.4, s * 0.35, s * 0.8, 7);
      ctx.fillStyle  = '#2a2a2a';
      ctx.shadowBlur = 0;
      ctx.fill();
      ctx.beginPath();
      ctx.rect(-5, s * 0.42, 10, s * 0.4);
      ctx.fillStyle = '#1a0800';
      ctx.fill();
      ctx.restore();
    }

    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle   = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 8;
      ctx.fill();
      ctx.restore();
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i + randomBetween(0, 0.5);
        const speed = randomBetween(2, 5);
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: randomBetween(3, 7),
          color,
          alpha: 1,
        });
      }
    }

    // ---------- game logic ----------

    function update() {
      const now = Date.now();
      targets = targets.filter(t => {
        const age = now - t.born;
        if (t.hit) return age < 400;
        t.scale = Math.min(1, age / 200);
        if (age > t.lifetime) {
          if (!t.isFire && gameRunning) {
            lives = Math.max(0, lives - 1);
            livesEl.textContent = lives;
            if (lives <= 0) endGame();
          }
          return false;
        }
        return true;
      });
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.alpha -= 0.04;
      });
      particles = particles.filter(p => p.alpha > 0);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth   = 1;
      for (let x = 0; x < canvas.width;  x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      const now = Date.now();
      targets.forEach(t => {
        const age = now - t.born;
        const fadeStart = t.lifetime * 0.7;
        let alpha = t.hit ? Math.max(0, 1 - age / 400) : 1;
        if (!t.hit && age > fadeStart) {
          alpha = 1 - (age - fadeStart) / (t.lifetime - fadeStart);
        }
        alpha = Math.max(0, alpha);
        ctx.globalAlpha = alpha;

        // Timer circle (behind sword)
        if (!t.hit) {
          const progress = Math.max(0, 1 - age / t.lifetime);
          drawTimerIndicator(t.x, t.y, t.isFire ? '#ff4500' : t.color, progress);
        }

        const swordScale = t.hit ? t.scale * (1 + (age / 400) * 0.5) : t.scale;
        if (t.isFire) {
          drawFireSword(t.x, t.y, swordScale);
          if (!t.hit) {
            ctx.save();
            ctx.globalAlpha = alpha * (0.7 + 0.3 * Math.sin(now / 300));
            ctx.font        = 'bold 13px Arial';
            ctx.fillStyle   = '#ff8800';
            ctx.textAlign   = 'center';
            ctx.fillText('⚠ DANGER', t.x, t.y - SWORD_SIZE - 10);
            ctx.restore();
          }
        } else {
          drawSword(t.x, t.y, t.color, swordScale);
        }
        ctx.globalAlpha = 1;
      });

      particles.forEach(drawParticle);
    }

    function gameLoop() {
      if (!gameRunning) return;
      update();
      render();
      animFrame = requestAnimationFrame(gameLoop);
    }

    function startGame() {
      score = 0; lives = 3;
      targets = []; particles = [];
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      updateDiffDisplay();
      overlay.style.display = 'none';
      gameRunning = true;
      spawnTarget();
      spawnInterval = setInterval(() => { if (gameRunning) spawnTarget(); }, 900);
      gameLoop();
    }

    function winGame() {
      gameRunning = false;
      clearInterval(spawnInterval);
      cancelAnimationFrame(animFrame);
      render();
      overlay.innerHTML = `
        <h2 style="color:#f1c40f; text-shadow:0 0 20px #f1c40f;">🏆 You Win!</h2>
        <p>You reached <strong style="color:#4caf50; font-size:26px;">50 points!</strong></p>
        <p style="color:#aaa; font-size:15px;">⚔️ Legendary Swordmaster!</p>
        <button id="restart-btn" style="background:green;color:white;border:none;padding:14px 40px;border-radius:8px;font-size:20px;cursor:pointer;">▶ Play Again</button>
      `;
      overlay.style.display = 'flex';
      document.getElementById('restart-btn').addEventListener('click', startGame);
    }

    function endGame() {
      gameRunning = false;
      clearInterval(spawnInterval);
      cancelAnimationFrame(animFrame);
      render();
      overlay.innerHTML = `
        <h2>Game Over!</h2>
        <p>Your score: <strong style="color:#4caf50; font-size:26px;">${score}</strong> / 50</p>
        <p style="color:#aaa; font-size:15px;">${score >= 40 ? '⚔️ So close! Try again!' : score >= 20 ? '🗡 Good effort!' : '🛡 Keep practicing!'}</p>
        <button id="restart-btn" style="background:green;color:white;border:none;padding:14px 40px;border-radius:8px;font-size:20px;cursor:pointer;">▶ Play Again</button>
      `;
      overlay.style.display = 'flex';
      document.getElementById('restart-btn').addEventListener('click', startGame);
    }

    canvas.addEventListener('click', e => {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      for (let i = targets.length - 1; i >= 0; i--) {
        const t = targets[i];
        if (t.hit) continue;
        const dist = Math.hypot(mx - t.x, my - t.y);
        if (dist < SWORD_SIZE) {
          t.hit = true;
          if (t.isFire) {
            spawnParticles(t.x, t.y, '#ff4500');
            lives = Math.max(0, lives - 1);
            livesEl.textContent = lives;
            if (lives <= 0) endGame();
          } else {
            spawnParticles(t.x, t.y, t.color);
            score += t.points;
            scoreEl.textContent = score;
            updateDiffDisplay();
            if (score >= WIN_SCORE) winGame();
          }
          break;
        }
      }
    });

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
