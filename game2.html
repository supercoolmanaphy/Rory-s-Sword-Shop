<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="images/sword5.jpg">
  <title>Knight's Quest – Rory's Sword Shop</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #1a1a2e;
      color: white;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 30px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #222;
    }

    .back { text-decoration: none; color: #aaa; font-size: 16px; }
    .back:hover { color: white; }

    #game-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      justify-content: flex-start;
    }

    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    #canvas {
      border: 3px solid #555;
      border-radius: 8px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .controls-hint {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-top: 8px;
    }

    #sidebar {
      min-width: 210px;
      width: 210px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #region-image-panel {
      background: #1a0d04;
      border: 2px solid #8a5a20;
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }

    #region-img {
      width: 100%;
      display: block;
      border-radius: 6px;
    }

    #stats-panel {
      background: #1a0d04;
      border: 2px solid #8a5a20;
      border-radius: 8px;
      padding: 10px 12px;
      color: white;
    }

    .panel-title {
      font-size: 13px;
      font-weight: bold;
      color: #daa520;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 8px;
      border-bottom: 1px solid #554020;
      padding-bottom: 5px;
    }

    .stat-row {
      font-family: monospace;
      font-size: 12px;
      color: #eee;
      margin: 4px 0;
    }

    #s-hp-bar-outer {
      background: #440000;
      height: 9px;
      border-radius: 3px;
      margin: 2px 0 6px;
      overflow: hidden;
    }

    #s-hp-bar-fill {
      height: 100%;
      background: #cc2222;
      width: 100%;
      transition: width 0.2s;
    }

    #npc-portrait-panel {
      background: #1a0d04;
      border: 2px solid #8a5a20;
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }

    #npc-portrait-panel.hidden { display: none; }

    #npc-portrait-img {
      width: 100%;
      display: block;
      border-radius: 6px;
    }

    #npc-dialog-sidebar {
      background: #1a0d04;
      border: 2px solid #8a5a20;
      border-radius: 8px;
      padding: 10px 12px;
      color: white;
    }

    #npc-dialog-sidebar.hidden { display: none; }

    .modal-btn {
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      font-size: 13px;
      background: #444;
      color: white;
      cursor: pointer;
      margin-top: 6px;
    }

    .modal-btn:hover { background: #555; }

    .buy-btn {
      display: block;
      width: 100%;
      padding: 7px 10px;
      border-radius: 4px;
      border: 1px solid #8a5a20;
      background: #5a3a10;
      color: #daa520;
      font-size: 12px;
      cursor: pointer;
      margin: 4px 0;
      text-align: left;

      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;

      background: #2a1a0a;
      border: 3px solid #8a5a20;
      border-radius: 12px;
      padding: 28px 32px;
      min-width: 380px;
      max-width: 500px;
      box-shadow: 0 0 40px rgba(218,165,32,0.35);

    .modal-box h3 {
      margin: 0 0 18px;
      font-size: 22px;
      color: #daa520;
      text-align: center;
      letter-spacing: 1px;
    }

      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid rgba(218,165,32,0.25);

    .chest-item-info { flex: 1; }
    .chest-item-info strong { display: block; color: #eee; font-size: 15px; }
    .chest-item-info span   { font-size: 12px; color: #999; }

    .chest-item-take {
      background: #5a3a10;
      color: #daa520;
      border: 1px solid #8a5a20;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;

    .chest-item-take:hover:not(:disabled) { background: #7a4a18; }

      display: flex;
      gap: 12px;
      margin-top: 18px;
      justify-content: flex-end;
    }

    .modal-btns button {
      padding: 10px 22px;
      border-radius: 6px;
      border: none;
      font-size: 15px;

    #take-all-btn:hover { background: #f0b830; }
    #close-modal-btn { background: #444; color: white; }

</head>
<body>

<header>Rory's Sword Shop</header>

<div class="nav-bar">
  <a href="index.html" class="back">← Back to Shop</a>

</div>

<div id="game-area">

  </div>
  <div id="sidebar">
    <div id="region-image-panel">

</div>

<div id="chest-modal" class="hidden">

    <div class="modal-btns">

      <button id="close-modal-btn">Close</button>
    </div>
  </div>
</div>

// ================================================================
//  DRAWING HELPERS
// ================================================================

function px(col) { return col * TILE; }
function py(row) { return row * TILE; }

// fill a rectangle with pixel-perfect integer coords
function fr(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// ── tile drawing ─────────────────────────────────────────────────
function drawTile(type, col, row) {
  const x = px(col), y = py(row);
  switch (type) {

    // ─ wood floor ────────────────────────────────────────────────
    case T.FLOOR: {
      fr(x, y, TILE, TILE, '#3e2610');
      // plank lines
      fr(x, y+13, TILE, 1, '#2e1c0a');
      fr(x, y+26, TILE, 1, '#2e1c0a');
      // grain
      fr(x+8,  y+4,  2, 8, '#4a2e14');
      fr(x+22, y+16, 2, 6, '#4a2e14');
      fr(x+32, y+3,  1, 5, '#4a2e14');
      break;
    }

    // ─ stone wall ────────────────────────────────────────────────
    case T.WALL: {
      fr(x, y, TILE, TILE, '#5a5650');
      // mortar
      fr(x,    y+13, TILE, 2, '#3a3630');
      fr(x,    y+27, TILE, 2, '#3a3630');
      fr(x+20, y,    2, 13, '#3a3630');
      fr(x+10, y+15, 2, 12, '#3a3630');
      fr(x+30, y+15, 2, 12, '#3a3630');
      fr(x+20, y+29, 2, 11, '#3a3630');
      // stone highlight
      fr(x+1,  y+1,  18, 1, '#706860');
      fr(x+21, y+1,  18, 1, '#706860');
      fr(x+1,  y+15, 8,  1, '#706860');
      fr(x+21, y+15, 8,  1, '#706860');
      break;
    }

    // ─ fence (village border) ────────────────────────────────────
    case T.FENCE: {
      fr(x, y, TILE, TILE, '#2a2820');
      fr(x+2, y+2, TILE-4, TILE-4, '#4a4840');
      fr(x+8,  y,  8, 10, '#2a2820');
      fr(x+24, y,  8, 10, '#2a2820');
      fr(x+8,  y+TILE-10, 8, 10, '#2a2820');
      fr(x+24, y+TILE-10, 8, 10, '#2a2820');
      break;
    }

    // ─ barrel ────────────────────────────────────────────────────
    case T.BARREL: {
      const bx=x+8, by=y+4, bw=24, bh=32;
      fr(bx+2, by,      bw-4, 5,    '#8a5a28'); // top cap
      fr(bx,   by+5,    bw,   bh-10,'#6e401a'); // body
      fr(bx+2, by+bh-5, bw-4, 5,    '#8a5a28'); // bottom cap
      // staves
      fr(bx+7,  by, 2, bh, '#5a3010');
      fr(bx+15, by, 2, bh, '#5a3010');
      // bands
      fr(bx, by+9,    bw, 3, '#555');
      fr(bx, by+bh-12,bw, 3, '#555');
      break;
    }

    // ─ shelf ─────────────────────────────────────────────────────
    case T.SHELF: {
      fr(x, y, TILE, 10, '#4a3020');    // back-wall mount
      fr(x, y+10, TILE, 7, '#7c4a20'); // shelf plank
      fr(x+TILE/2-1, y+17, 2, 14, '#5a3010'); // bracket
      // items on shelf
      fr(x+4,  y+17, 9, 10, '#c8a060'); // pot
      fr(x+16, y+16, 6, 11, '#a06040'); // jar
      fr(x+26, y+17, 10, 9, '#7a5030'); // book
      break;
    }

    // ─ chest (closed) ────────────────────────────────────────────
    case T.CHEST_C: {
      const cx=x+4, cy=y+8, cw=32, ch=24;
      fr(cx,      cy,      cw,  ch,  '#7a4a10'); // box
      fr(cx,      cy,      cw,  10,  '#8a5a20'); // lid
      // metal corners
      fr(cx,       cy,       4, 4, '#aaa');
      fr(cx+cw-4,  cy,       4, 4, '#aaa');
      fr(cx,       cy+ch-4,  4, 4, '#aaa');
      fr(cx+cw-4,  cy+ch-4,  4, 4, '#aaa');
      // lock
      fr(cx+cw/2-4, cy+2, 8, 7, '#daa520');
      // [E] hint
      ctx.fillStyle = 'rgba(255,255,180,0.75)';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[E]', x+TILE/2, y+TILE-4);
      ctx.textAlign = 'left';
      break;
    }

    // ─ chest (open) ──────────────────────────────────────────────
    case T.CHEST_O: {
      const cx=x+4, cy=y+14, cw=32, ch=18;
      fr(cx, cy,    cw, ch,  '#7a4a10'); // box
      fr(cx, cy-12, cw, 10,  '#8a5a20'); // lid (open, tilted back)
      fr(cx+2, cy+2, cw-4, ch-4, '#2a1408'); // interior dark
      fr(cx,       cy,       4, 4, '#aaa');
      fr(cx+cw-4,  cy,       4, 4, '#aaa');
      break;
    }

    // ─ bed quarters ──────────────────────────────────────────────
    case T.BED_TL: {
      fr(x, y, TILE, TILE, '#5a3010');       // frame
      fr(x+3, y+3, TILE-3, TILE-3, '#ddd'); // pillow
      fr(x+3, y+3, TILE-3, 3, '#bbb');      // pillow shadow
      break;
    }
    case T.BED_TR: {
      fr(x, y, TILE, TILE, '#5a3010');
      fr(x, y+3, TILE-3, TILE-3, '#ddd');
      fr(x, y+3, TILE-3, 3, '#bbb');
      fr(x+TILE-6, y, 6, TILE, '#6a3818'); // headboard post
      break;
    }
    case T.BED_BL: {
      fr(x, y, TILE, TILE, '#5a3010');
      fr(x+3, y, TILE-3, TILE-3, '#5a72a0'); // blanket
      fr(x+3, y, TILE-3, 4, '#7090c0');
      break;
    }
    case T.BED_BR: {
      fr(x, y, TILE, TILE, '#5a3010');
      fr(x, y, TILE-3, TILE-3, '#5a72a0');
      fr(x, y, TILE-3, 4, '#7090c0');
      fr(x+TILE-6, y+TILE-18, 6, 18, '#6a3818'); // footboard post
      break;
    }

    // ─ door (right wall) ─────────────────────────────────────────
    case T.DOOR_R: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#7a4a15');
      fr(x+7, y+5, 10, 13, '#5a3010');
      fr(x+7, y+20, 10, 12, '#5a3010');
      fr(x+4, y+TILE/2-3, 5, 5, '#daa520'); // handle
      // arrow
      ctx.fillStyle = '#ffee44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▶', x+TILE/2+6, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ door (left wall) ──────────────────────────────────────────
    case T.DOOR_L: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#7a4a15');
      fr(x+7, y+5, 10, 13, '#5a3010');
      fr(x+7, y+20, 10, 12, '#5a3010');
      fr(x+TILE-9, y+TILE/2-3, 5, 5, '#daa520');
      ctx.fillStyle = '#ffee44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('◀', x+TILE/2-6, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ cobblestone ───────────────────────────────────────────────
    case T.COBBLE: {
      fr(x, y, TILE, TILE, '#7a7870');
      fr(x+1,  y+1,  18, 18, '#8a8880');
      fr(x+21, y+1,  18, 18, '#8a8880');
      fr(x+1,  y+21, 18, 18, '#8a8880');
      fr(x+21, y+21, 18, 18, '#8a8880');
      // stone highlight
      fr(x+2,  y+2,  16, 1, '#9a9890');
      fr(x+22, y+2,  16, 1, '#9a9890');
      fr(x+2,  y+22, 16, 1, '#9a9890');
      fr(x+22, y+22, 16, 1, '#9a9890');
      break;
    }

    // ─ grass ─────────────────────────────────────────────────────
    case T.GRASS: {
      fr(x, y, TILE, TILE, '#3a7230');
      fr(x+5,  y+8,  6, 3, '#4a8238');
      fr(x+22, y+24, 5, 3, '#4a8238');
      fr(x+30, y+10, 4, 3, '#4a8238');
      fr(x+14, y+32, 7, 3, '#2e6028');
      break;
    }

    // ─ tree ──────────────────────────────────────────────────────
    case T.TREE: {
      fr(x, y, TILE, TILE, '#3a7230'); // grass base
      // trunk
      fr(x+16, y+24, 8, 14, '#5a3010');
      // canopy (dark green circles via rects to keep pixel art feel)
      fr(x+6,  y+4,  28, 22, '#1e5418');
      fr(x+4,  y+8,  32, 18, '#1e5418');
      fr(x+8,  y+2,  24, 24, '#1e5418');
      // highlight
      fr(x+10, y+6,  12, 8, '#2a6a20');
      break;
    }

    // ─ well (only TL is drawn; TR/BL/BR are transparent) ─────────
    case T.WELL_TL: {
      const wx=x, wy=y, ws=TILE*2;
      fr(wx,    wy,    ws, ws,   '#6e6a62'); // stone base
      fr(wx+4,  wy+4,  ws-8, ws-8, '#7e7a72');
      // well hole
      fr(wx+14, wy+14, 12, 12, '#1a1208');
      fr(wx+15, wy+15, 10, 10, '#0a0804');
      // wooden crossbar posts
      fr(wx+10, wy+6,  4, 22, '#5a3010');
      fr(wx+ws-14, wy+6, 4, 22, '#5a3010');
      fr(wx+10, wy+6,  ws-20, 4, '#5a3010'); // top bar
      // rope
      ctx.strokeStyle = '#c8a060';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(wx+ws/2, wy+10);
      ctx.lineTo(wx+ws/2, wy+14);
      ctx.stroke();
      ctx.lineWidth = 1;
      break;
    }
    case T.WELL_TR:
    case T.WELL_BL:
    case T.WELL_BR:
      // drawn entirely by WELL_TL
      break;

    // ─ sign ──────────────────────────────────────────────────────
    case T.SIGN: {
      fr(x, y, TILE, TILE, '#3a7230');   // grass base
      fr(x+18, y+18, 4, 20, '#5a3010'); // post
      fr(x+6,  y+8,  28, 18, '#8a5a20'); // board
      fr(x+7,  y+9,  26, 16, '#9a6a30');
      ctx.fillStyle = '#2a1008';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('MARKET', x+TILE/2, y+18);
      ctx.fillText('SQUARE', x+TILE/2, y+26);
      ctx.textAlign = 'left';
      break;
    }

    // ─ market stall ──────────────────────────────────────────────
    case T.STALL_L: {
      fr(x, y+12, TILE, TILE-12, '#7a4a10');
      fr(x, y+10, TILE, 6, '#9a6030');   // counter
      fr(x, y,    TILE, 12, '#cc2222');  // awning
      for (let i=2; i<TILE; i+=8) fr(x+i, y, 4, 12, '#eee');
      // goods on counter
      fr(x+4,  y+16, 8, 6, '#daa520');
      fr(x+16, y+15, 6, 7, '#cc4444');
      break;
    }
    case T.STALL_R: {
      fr(x, y+12, TILE, TILE-12, '#7a4a10');
      fr(x, y+10, TILE, 6, '#9a6030');
      fr(x, y,    TILE, 12, '#cc2222');
      for (let i=2; i<TILE; i+=8) fr(x+i, y, 4, 12, '#eee');
      fr(x+6,  y+16, 8, 6, '#6080cc');
      fr(x+20, y+15, 6, 7, '#50aa50');
      break;
    }

    // ─ black (unused space) ──────────────────────────────────────
    case T.BLACK: {
      fr(x, y, TILE, TILE, '#000000');
      break;
    }

    // ─ door (upward, village → farmland) ─────────────────────────
    case T.DOOR_U: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#7a4a15');
      fr(x+7, y+5, 10, 13, '#5a3010');
      fr(x+7, y+20, 10, 12, '#5a3010');
      fr(x+TILE/2-3, y+TILE-9, 5, 5, '#daa520');
      ctx.fillStyle = '#ffee44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▲', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ door (downward, farmland → village) ───────────────────────
    case T.DOOR_D: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#7a4a15');
      fr(x+7, y+5, 10, 13, '#5a3010');
      fr(x+7, y+20, 10, 12, '#5a3010');
      fr(x+TILE/2-3, y+6, 5, 5, '#daa520');
      ctx.fillStyle = '#ffee44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▼', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ plowed dirt ───────────────────────────────────────────────
    case T.DIRT: {
      fr(x, y, TILE, TILE, '#5a3a18');
      for (let fy = y+4; fy < y+TILE; fy += 10) fr(x, fy, TILE, 4, '#4a2e12');
      fr(x+5,  y+1,  4, 3, '#6a4a22');
      fr(x+20, y+13, 4, 3, '#6a4a22');
      fr(x+30, y+22, 3, 4, '#6a4a22');
      break;
    }

    // ─ growing crops (wheat) ─────────────────────────────────────
    case T.CROP: {
      fr(x, y, TILE, TILE, '#5a3a18');
      for (let fy = y+4; fy < y+TILE; fy += 10) fr(x, fy, TILE, 3, '#4a2e12');
      for (let cx2 = x+4; cx2 < x+TILE-2; cx2 += 8) {
        fr(cx2,   y+18, 2, 14, '#7a8a10'); // stalk
        fr(cx2-2, y+10, 6,  8, '#aabb28'); // grain head
        fr(cx2-1, y+8,  4,  4, '#c8d040'); // tip
      }
      break;
    }

    // ─ half-timbered house wall ───────────────────────────────────
    case T.HOUSE_W: {
      fr(x, y, TILE, TILE, '#c8b090');                   // plaster
      fr(x, y+TILE/2-1, TILE, 3, '#5a3010');             // horizontal beam
      fr(x+TILE/2-1, y, 3, TILE, '#5a3010');             // vertical beam
      fr(x, y, 3, 3, '#5a3010');                          // corner braces
      fr(x+TILE-3, y, 3, 3, '#5a3010');
      fr(x, y+TILE-3, 3, 3, '#5a3010');
      fr(x+TILE-3, y+TILE-3, 3, 3, '#5a3010');
      break;
    }

    // ─ blocked / closed door ─────────────────────────────────────
    case T.DOOR_CLOSED: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+4, TILE-8, TILE-8, '#7a4a15');
      fr(x+6, y+8,  12, 16, '#5a3010');
      fr(x+6, y+26, 12,  8, '#5a3010');
      fr(x+TILE/2-4, y+TILE/2-2, 8, 7, '#daa520'); // lock
      break;
    }

    // ─ storeroom door (building entrance / exit) ─────────────────
    case T.DOOR_STORE: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#6a3a10');
      fr(x+7, y+5, 10, 13, '#4a2808');
      fr(x+7, y+20, 10, 12, '#4a2808');
      fr(x+TILE/2-3, y+TILE/2-3, 6, 6, '#daa520'); // handle
      ctx.fillStyle = '#ffee44';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('★', x+TILE/2, y+TILE/2+8);
      ctx.textAlign = 'left';
      break;
    }

    // ─ farmland→forest door ──────────────────────────────────────
    case T.DOOR_FL: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#2a5a10');
      fr(x+7, y+5, 10, 13, '#1a3a08');
      fr(x+7, y+20, 10, 12, '#1a3a08');
      fr(x+TILE/2-3, y+TILE-9, 5, 5, '#daa520');
      ctx.fillStyle = '#88ff44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('🌲', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ forest→farmland door ──────────────────────────────────────
    case T.DOOR_FO: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#2a5a10');
      fr(x+7, y+5, 10, 13, '#1a3a08');
      fr(x+7, y+20, 10, 12, '#1a3a08');
      fr(x+TILE/2-3, y+6, 5, 5, '#daa520');
      ctx.fillStyle = '#88ff44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('🌲', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ river water ───────────────────────────────────────────────
    case T.WATER: {
      fr(x, y, TILE, TILE, '#1a4a7a');
      fr(x+2, y+8, TILE-4, 4, '#2a5a8a');
      fr(x+2, y+24, TILE-4, 4, '#2a5a8a');
      fr(x+6, y+16, 8, 3, '#3a6a9a');
      break;
    }

    // ─ wooden bridge ─────────────────────────────────────────────
    case T.BRIDGE: {
      fr(x, y, TILE, TILE, '#7a5a30');
      fr(x, y+12, TILE, 4, '#6a4a20');
      fr(x, y+26, TILE, 4, '#6a4a20');
      fr(x, y, 4, TILE, '#5a3010');
      fr(x+TILE-4, y, 4, TILE, '#5a3010');
      break;
    }

    // ─ windmill ──────────────────────────────────────────────────
    case T.WINDMILL: {
      fr(x, y, TILE, TILE, '#8a8278');
      fr(x+10, y+4, 20, 30, '#aa9a8a');
      fr(x+TILE/2-1, y, 2, 14, '#c8b090');
      fr(x+TILE/2-1, y+24, 2, 14, '#c8b090');
      fr(x, y+TILE/2-1, 14, 2, '#c8b090');
      fr(x+24, y+TILE/2-1, 14, 2, '#c8b090');
      ctx.fillStyle = '#554030';
      ctx.beginPath();
      ctx.arc(x+TILE/2, y+TILE/2, 4, 0, Math.PI*2);
      ctx.fill();
      break;
    }

    // ─ tall forest tree ──────────────────────────────────────────
    case T.TREE_T: {
      fr(x, y, TILE, TILE, '#0d1a08');
      fr(x+16, y+28, 8, 12, '#3a2008');
      fr(x+4,  y+0,  32, 30, '#0a2008');
      fr(x+2,  y+4,  36, 26, '#0a2008');
      fr(x+8,  y-2,  24, 32, '#0a2008');
      fr(x+10, y+2,  12, 10, '#142e0c');
      break;
    }

    // ─ red mushroom ──────────────────────────────────────────────
    case T.MUSH: {
      fr(x, y, TILE, TILE, '#0d1a08');
      fr(x+16, y+24, 8, 12, '#d0c0a0');
      fr(x+10, y+14, 20, 10, '#cc2222');
      fr(x+8,  y+16, 24, 8, '#cc2222');
      fr(x+12, y+12, 16, 6, '#dd3333');
      fr(x+13, y+15, 3, 3, '#eeeeee');
      fr(x+22, y+17, 3, 3, '#eeeeee');
      break;
    }

    // ─ farmland → Planter's Farm door (upward, wheat) ────────────
    case T.DOOR_PL: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#7a5a10');
      fr(x+7, y+5, 10, 13, '#5a4008');
      fr(x+7, y+20, 10, 12, '#5a4008');
      fr(x+TILE/2-3, y+TILE-9, 5, 5, '#daa520');
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('🌾', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ Planter's Farm → farmland door (downward, wheat) ──────────
    case T.DOOR_LP: {
      fr(x, y, TILE, TILE, '#5a5650');
      fr(x+4, y+2, TILE-8, TILE-4, '#7a5a10');
      fr(x+7, y+5, 10, 13, '#5a4008');
      fr(x+7, y+20, 10, 12, '#5a4008');
      fr(x+TILE/2-3, y+6, 5, 5, '#daa520');
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('🌾', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ forest → deep forest door (bottom-right, dark) ────────────
    case T.DOOR_DF: {
      fr(x, y, TILE, TILE, '#1a2a10');
      fr(x+4, y+2, TILE-8, TILE-4, '#0e1e08');
      fr(x+7, y+5, 10, 13, '#080e04');
      fr(x+7, y+20, 10, 12, '#080e04');
      fr(x+TILE/2-3, y+6, 5, 5, '#446030');
      ctx.fillStyle = '#446030';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▼', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    // ─ deep forest → forest door (upward, back to forest) ────────
    case T.DOOR_FD: {
      fr(x, y, TILE, TILE, '#1a2a10');
      fr(x+4, y+2, TILE-8, TILE-4, '#0e1e08');
      fr(x+7, y+5, 10, 13, '#080e04');
      fr(x+7, y+20, 10, 12, '#080e04');
      fr(x+TILE/2-3, y+TILE-9, 5, 5, '#446030');
      ctx.fillStyle = '#88cc44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▲', x+TILE/2, y+TILE/2+5);
      ctx.textAlign = 'left';
      break;
    }

    default:
      break;
  }
}

// ── knight sprite ────────────────────────────────────────────────
function drawKnight(px, py, facing, walkFrame) {
  const cx = px + TILE / 2;
  const cy = py + TILE / 2;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(cx, py+TILE-4, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // leg offset for walking animation
  const lOff = walkFrame === 0 ? 2 : -2;

  // ─ legs
  if (facing === 'left' || facing === 'right') {
    // side view: single stride
    fr(cx-5, cy+6, 5, 10, '#484040');
    fr(cx+1,  cy+6+(walkFrame===0?-3:3), 4, 10, '#484040');
  } else {
    fr(cx-7, cy+6+lOff,  5, 10, '#484040');
    fr(cx+2, cy+6-lOff,  5, 10, '#484040');
  }

  // ─ body / tabard
  fr(cx-9, cy-5, 18, 14, '#8a8888');   // chain-mail base
  fr(cx-7, cy-3, 14, 10, '#aaaaaa');   // chest plate
  // cross on tabard
  fr(cx-1, cy-3, 3, 10, '#cc2222');
  fr(cx-7, cy+1, 14, 3, '#cc2222');

  // ─ shield (left side) & sword (right side)
  if (facing === 'right') {
    fr(cx+9,  cy-2, 4, 12, '#c8a060'); // sword blade
    fr(cx+9,  cy+8, 4,  2, '#888');    // guard
  } else if (facing === 'left') {
    fr(cx-6,  cy-4, 8, 12, '#6688aa'); // shield
    fr(cx-7,  cy-5, 10, 2, '#7799bb');
  } else {
    fr(cx+9,  cy,   4, 10, '#c8a060'); // sword right
    fr(cx-12, cy,   7, 10, '#6688aa'); // shield left
    fr(cx-13, cy-1, 9, 2,  '#7799bb');
  }

  // ─ head
  fr(cx-6, cy-15, 12, 12, '#e0c898'); // face
  // eyes / facing indicator
  if (facing === 'down') {
    fr(cx-3, cy-10, 2, 2, '#333');
    fr(cx+1, cy-10, 2, 2, '#333');
  } else if (facing === 'up') {
    fr(cx-3, cy-13, 2, 2, '#333');
    fr(cx+1, cy-13, 2, 2, '#333');
  } else if (facing === 'right') {
    fr(cx+2, cy-11, 2, 2, '#333');
  } else {
    fr(cx-4, cy-11, 2, 2, '#333');
  }

  // ─ helmet
  fr(cx-7, cy-20, 14, 8, '#666');
  fr(cx-6, cy-21, 12, 3, '#555');       // top ridge
  fr(cx-5, cy-14, 10, 3, '#555');       // visor slit
  fr(cx-2, cy-14, 1, 3, '#888');
  fr(cx+1, cy-14, 1, 3, '#888');
}

// ── NPC sprite ───────────────────────────────────────────────────
function drawNPC(npc) {
  const nx = npc.tileX * TILE;
  const ny = npc.tileY * TILE;
  const cx = nx + TILE / 2;
  const cy = ny + TILE / 2;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx, ny + TILE - 5, 8, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // legs
  fr(cx-5, cy+6,  4, 10, '#484040');
  fr(cx+1,  cy+6, 4, 10, '#484040');

  // body
  fr(cx-6, cy-3, 12, 12, npc.outfitColor);

  // head
  fr(cx-5, cy-14, 10, 10, '#e0c898');

  // hair
  fr(cx-5, cy-16, 10, 4, npc.hairColor);

  // eyes
  fr(cx-2, cy-10, 2, 2, '#333');
  fr(cx+1,  cy-10, 2, 2, '#333');

    fr(cx+6, cy-6,  3, 12, '#888888'); // handle

  ctx.textAlign = 'center';
  ctx.fillText(npc.name, cx, ny - 7);
  ctx.textAlign = 'left';
}

// ── footsteps ────────────────────────────────────────────────────
function drawFootsteps() {
  for (const fp of footsteps) {
    const alpha = Math.max(0, 1 - fp.age) * 0.45;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    const rot = fp.facing === 'up'    ?  0
              : fp.facing === 'down'  ?  Math.PI
              : fp.facing === 'left'  ?  Math.PI/2
              :                         -Math.PI/2;
    ctx.save();
    ctx.translate(Math.round(fp.x), Math.round(fp.y));
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, 3, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -5, 2, 2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ================================================================
//  WALKABILITY / PATHFINDING
// ================================================================

function isBlockedByNpc(col, row) {
  return NPCS.some(n => n.room === roomIdx && n.tileX === col && n.tileY === row);
}

function isWalkable(room, col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  if (!WALKABLE.has(room.map[row][col])) return false;
  if (isBlockedByNpc(col, row)) return false;
  return true;
}

// ── NPC adjacency / interaction ──────────────────────────────────
function adjacentNpc() {
  return NPCS.find(n => {
    if (n.room !== roomIdx) return false;
    const dx = Math.abs(player.tileX - n.tileX);
    const dy = Math.abs(player.tileY - n.tileY);
    return (dx + dy) === 1;
  }) || null;
}

// BFS – returns array of {x,y} steps (not including start, including end)
function bfs(room, fromX, fromY, toX, toY) {
  if (!isWalkable(room, toX, toY)) return [];
  const visited = Array.from({length: ROWS}, () => new Array(COLS).fill(false));
  const parent  = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
  const queue   = [{x:fromX, y:fromY}];
  visited[fromY][fromX] = true;

  while (queue.length) {
    const {x, y} = queue.shift();
    if (x === toX && y === toY) {
      // reconstruct
      const path = [];
      let cur = {x:toX, y:toY};
      while (cur.x !== fromX || cur.y !== fromY) {
        path.unshift(cur);
        cur = parent[cur.y][cur.x];
      }
      return path;
    }
    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx=x+dx, ny=y+dy;
      if (isWalkable(room, nx, ny) && !visited[ny][nx]) {
        visited[ny][nx] = true;
        parent[ny][nx] = {x, y};
        queue.push({x:nx, y:ny});
      }
    }
  }
  return [];
}

function startTransition(targetRoom, spawnX, spawnY) {
  fade.active     = true;
  fade.phase      = 'out';
  fade.alpha      = 0;
  fade.targetRoom = targetRoom;
  fade.spawnX     = spawnX;
  fade.spawnY     = spawnY;
  player.path     = [];
  clickTarget     = null;
}

function applyTransition() {
  roomIdx     = fade.targetRoom;
  player.tileX  = fade.spawnX;
  player.tileY  = fade.spawnY;
  player.targetX = fade.spawnX;
  player.targetY = fade.spawnY;
  player.pxX    = fade.spawnX * TILE;
  player.pxY    = fade.spawnY * TILE;
  player.moving = false;
  player.path   = [];
  updateRegionImage();
}

function isAdjacentToChest() {
  const room = ROOMS[roomIdx];
  if (!room.chestTile) return false;
  const {x:cx, y:cy} = room.chestTile;
  const dx = Math.abs(player.tileX - cx);
  const dy = Math.abs(player.tileY - cy);
  return (dx + dy) === 1;
}

function openChestModal() {
  modalOpen = true;
  canvas.blur();
  const list = document.getElementById('chest-items-list');
  list.innerHTML = '';

  const untaken = CHEST_ITEMS.filter(item => !item.taken);

  if (untaken.length === 0) {
    const msg = document.createElement('p');
    msg.style.cssText = 'color:#999;text-align:center;padding:16px 0;font-style:italic;margin:0;';
    msg.textContent = 'This chest is empty.';
    list.appendChild(msg);
  } else {
    untaken.forEach(item => {
      const row = document.createElement('div');
      row.className = 'chest-item';
      row.innerHTML = `
        <span class="chest-item-icon">${item.icon}</span>
        <div class="chest-item-info">
          <strong>${item.name}</strong>
          <span>${item.desc}</span>
        </div>
        <button class="chest-item-take" data-id="${item.id}">Take</button>`;
      list.appendChild(row);
    });
  }

  const takeAllBtn = document.getElementById('take-all-btn');
  takeAllBtn.style.display = untaken.length === 0 ? 'none' : '';

  document.getElementById('chest-modal').classList.remove('hidden');

  // per-item take
  list.querySelectorAll('.chest-item-take').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const item = CHEST_ITEMS.find(i => i.id === id);
      if (!item || item.taken) return;
      if (addToInventory(item)) {
        item.taken = true;
        btn.closest('.chest-item').remove();
        if (CHEST_ITEMS.every(i => i.taken)) {
          list.innerHTML = '<p style="color:#999;text-align:center;padding:16px 0;font-style:italic;margin:0;">This chest is empty.</p>';
          document.getElementById('take-all-btn').style.display = 'none';
        }
      }
    });
  });
}

function closeChestModal() {
  modalOpen = false;
  document.getElementById('chest-modal').classList.add('hidden');
  canvas.focus();
}

function addToInventory(item) {
  if (item.isCoins) {
    player.coins += item.amount || 1;
    return true;
  }
  const slot = inventory.indexOf(null);
  if (slot === -1) return false; // no space
  inventory[slot] = { icon: item.icon, name: item.name, id: item.id };
  return true;
}

function takeAllItems() {
  CHEST_ITEMS.forEach(item => {
    if (!item.taken) {
      if (addToInventory(item)) item.taken = true;
    }
  });
  // show empty state
  const list = document.getElementById('chest-items-list');
  list.innerHTML = '<p style="color:#999;text-align:center;padding:16px 0;font-style:italic;margin:0;">This chest is empty.</p>';
  document.getElementById('take-all-btn').style.display = 'none';
}

// ================================================================
//  INPUT
// ================================================================

// Direction map: key → [dx, dy, facingName]
const DIRS = {
  w: [0,-1,'up'],   arrowup:    [0,-1,'up'],
  s: [0, 1,'down'], arrowdown:  [0, 1,'down'],
  a: [-1,0,'left'], arrowleft:  [-1,0,'left'],
  d: [ 1,0,'right'],arrowright: [ 1,0,'right'],
};

document.addEventListener('keydown', e => {
  const lk = e.key.toLowerCase();
  keys[lk] = true;

  // Immediate single-tap movement (fires even for brief key presses)
  const dir = DIRS[lk];
  if (dir && !player.moving && player.path.length === 0 && !modalOpen && !fade.active) {
    const [dx, dy, face] = dir;
    player.facing = face;
    const nx = player.tileX + dx;
    const ny = player.tileY + dy;
    if (isWalkable(ROOMS[roomIdx], nx, ny)) {
      player.targetX   = nx;
      player.targetY   = ny;
      player.moving    = true;
      player.walkTimer = 0;
      player.path      = [];
    }
  }

  // inventory slot selection
  if (e.key >= '1' && e.key <= '5') {
    selectedSlot = parseInt(e.key) - 1;
  }

  // interact with chest or NPC
  if ((e.key === 'e' || e.key === 'E') && !modalOpen) {
    const room = ROOMS[roomIdx];
    if (room.chestTile && isAdjacentToChest()) {
      // mark chest tile as open
      const {x:cx, y:cy} = room.chestTile;
      room.map[cy][cx] = T.CHEST_O;
      chestOpen = true;
      openChestModal();
    } else {
      const npc = adjacentNpc();
      if (npc) openNpcDialog(npc);
    }
  }

  if (e.key === 'Escape' && modalOpen) {
    closeChestModal();
    closeNpcDialog();
  }

  // prevent page scroll with arrow/space
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('click', e => {
  if (modalOpen || fade.active) return;
  const rect = canvas.getBoundingClientRect();
  // Scale mouse coords to match internal canvas resolution
  const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
  const my = (e.clientY - rect.top)  * (canvas.height / rect.height);

  // Hotbar region — slot selection + bread eating
  if (my >= GAME_H) {
    const slotSz = 52, gapSz = 4;
    const hxBar = Math.round((canvas.width - (5*slotSz + 4*gapSz)) / 2);
    const hyBar = GAME_H + Math.round((HOTBAR_H - slotSz) / 2);
    for (let i=0; i<5; i++) {
      const sx = hxBar + i*(slotSz+gapSz);
      if (mx>=sx && mx<sx+slotSz && my>=hyBar && my<hyBar+slotSz) {
        selectedSlot = i;
        // Eat bread if health is not full
        const heldItem = inventory[i];
        if (heldItem && heldItem.id === 'bread' && player.hp < player.maxHp) {
          player.hp = Math.min(player.maxHp, player.hp + 3);
          inventory[i] = null;
        }
      }
    }
    return;
  }

  // Game area clicks
  const clickCol = Math.floor(mx / TILE);
  const clickRow = Math.floor(my / TILE);
  const room = ROOMS[roomIdx];

  // Click directly on an NPC tile while adjacent → open dialog
  const clickedNpc = NPCS.find(n => n.room === roomIdx && n.tileX === clickCol && n.tileY === clickRow);
  if (clickedNpc) {
    const dx = Math.abs(player.tileX - clickedNpc.tileX);
    const dy = Math.abs(player.tileY - clickedNpc.tileY);
    if (dx + dy === 1) { openNpcDialog(clickedNpc); return; }
    return; // NPC tile blocks pathing anyway
  }

  // Click directly on chest tile while adjacent → open chest
  if (room.chestTile) {
    const {x:cx, y:cy} = room.chestTile;
    if (clickCol===cx && clickRow===cy && isAdjacentToChest()) {
      room.map[cy][cx] = T.CHEST_O;
      chestOpen = true;
      openChestModal();
      return;
    }
  }

  // Navigate to clicked tile via BFS
  if (!player.moving && player.path.length === 0) {
    player.path = bfs(room, player.tileX, player.tileY, clickCol, clickRow);
  } else {
    // Replace path mid-walk (re-route from current target tile)
    player.path = bfs(room, player.targetX, player.targetY, clickCol, clickRow);
  }
  if (player.path.length > 0) {
    clickTarget = { x: clickCol, y: clickRow };
  }
});

// modal buttons
document.getElementById('take-all-btn').addEventListener('click', takeAllItems);
document.getElementById('close-modal-btn').addEventListener('click', closeChestModal);
document.getElementById('npc-close-sidebar').addEventListener('click', closeNpcDialog);

// ================================================================
//  UPDATE
// ================================================================

function update(dt) {
  if (modalOpen) return;

  // ── age footsteps ──────────────────────────────────────────────
  for (let i = footsteps.length - 1; i >= 0; i--) {
    footsteps[i].age += dt;
    if (footsteps[i].age >= 1) footsteps.splice(i, 1);
  }

  if (fade.active) {
    if (fade.phase === 'out') {
      fade.alpha = Math.min(1, fade.alpha + dt * 5);
      if (fade.alpha >= 1) { applyTransition(); fade.phase = 'in'; }
    } else {
      fade.alpha = Math.max(0, fade.alpha - dt * 4);
      if (fade.alpha <= 0) fade.active = false;
    }
    return;
  }

  // ── movement ──────────────────────────────────────────────────
  if (player.moving) {
    player.walkTimer += dt;
    const t = Math.min(1, player.walkTimer / WALK_DUR);
    const startX = player.tileX * TILE;
    const startY = player.tileY * TILE;
    const endX   = player.targetX * TILE;
    const endY   = player.targetY * TILE;
    player.pxX   = startX + (endX - startX) * t;
    player.pxY   = startY + (endY - startY) * t;

    if (t >= 1) {
      // record footstep at the tile we just left
      const stepCx = player.tileX * TILE + TILE / 2;
      const stepCy = player.tileY * TILE + TILE / 2;
      const fSide  = player.walkFrame; // 0=left, 1=right
      const fOx = (player.facing === 'left' || player.facing === 'right') ? 0
                : (fSide === 0 ? -5 : 5);
      const fOy = (player.facing === 'left' || player.facing === 'right')
                ? (fSide === 0 ? -4 : 4) : 0;
      footsteps.push({ x: stepCx + fOx, y: stepCy + fOy, age: 0, facing: player.facing });
      if (footsteps.length > 12) footsteps.shift();

      player.tileX  = player.targetX;
      player.tileY  = player.targetY;
      player.pxX    = endX;
      player.pxY    = endY;
      player.moving = false;
      player.walkFrame = 1 - player.walkFrame;

      // clear click target if arrived
      if (clickTarget && player.tileX === clickTarget.x && player.tileY === clickTarget.y) {
        clickTarget = null;
      }

      // check door
      const tile = ROOMS[roomIdx].map[player.tileY][player.tileX];
      if (tile === T.DOOR_STORE && roomIdx === 0) {
        const sp = ROOMS[1].entryFromStoreroom;
        startTransition(1, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_STORE && roomIdx === 1) {
        const sp = ROOMS[0].entryFromVillage;
        startTransition(0, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_R && roomIdx === 1) {
        const sp = ROOMS[3].entryFromVillage;
        startTransition(3, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_L && roomIdx === 3) {
        const sp = ROOMS[1].entryFromRowanoak;
        startTransition(1, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_U && roomIdx === 1) {
        const sp = ROOMS[2].entryFromVillage;
        startTransition(2, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_D && roomIdx === 2) {
        const sp = ROOMS[1].entryFromFarmland;
        startTransition(1, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_R && roomIdx === 3) {
        const sp = ROOMS[4].entryFromRowanoak;
        startTransition(4, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_L && roomIdx === 4) {
        const sp = ROOMS[3].entryFromRiverside;
        startTransition(3, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_FL && roomIdx === 2) {
        const sp = ROOMS[5].entryFromFarmland;
        startTransition(5, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_FO && roomIdx === 5) {
        const sp = ROOMS[2].entryFromForest;
        startTransition(2, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_PL && roomIdx === 2) {
        const sp = ROOMS[7].entryFromFarmland;
        startTransition(7, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_LP && roomIdx === 7) {
        const sp = ROOMS[2].entryFromPlanters;
        startTransition(2, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_DF && roomIdx === 5) {
        const sp = ROOMS[6].entryFromForest;
        startTransition(6, sp.x, sp.y);
        return;
      }
      if (tile === T.DOOR_FD && roomIdx === 6) {
        const sp = ROOMS[5].entryFromDeepForest;
        startTransition(5, sp.x, sp.y);
        return;
      }

      // next path step
      if (player.path.length > 0) {
        const next = player.path.shift();
        player.targetX = next.x;
        player.targetY = next.y;
        player.facing  = next.x > player.tileX ? 'right'
                       : next.x < player.tileX ? 'left'
                       : next.y > player.tileY ? 'down' : 'up';
        player.moving     = true;
        player.walkTimer  = 0;
      }
    }
    return; // don't process keyboard while animating
  }

  // ── keyboard input (when idle) ────────────────────────────────
  if (player.path.length > 0) {
    const next = player.path.shift();
    player.targetX = next.x;
    player.targetY = next.y;
    player.facing  = next.x > player.tileX ? 'right'
                   : next.x < player.tileX ? 'left'
                   : next.y > player.tileY ? 'down' : 'up';
    player.moving    = true;
    player.walkTimer = 0;
    return;
  }

  // WASD / arrow keys
  for (const [key, [dx, dy, face]] of Object.entries(DIRS)) {
    if (!keys[key]) continue;
    player.facing = face;
    const nx = player.tileX + dx;
    const ny = player.tileY + dy;
    if (isWalkable(ROOMS[roomIdx], nx, ny)) {
      player.targetX   = nx;
      player.targetY   = ny;
      player.moving    = true;
      player.walkTimer = 0;
      player.path      = [];
    }
    break; // only one direction per frame
  }
}

// ================================================================
//  RENDER
// ================================================================

function render() {
  const room = ROOMS[roomIdx];

  // ── background ──────────────────────────────────────────────
  fr(0, 0, canvas.width, GAME_H, room.bgColor);

  // ── tiles ───────────────────────────────────────────────────
  for (let row=0; row<ROWS; row++) {
    for (let col=0; col<COLS; col++) {
      drawTile(room.map[row][col], col, row);
    }
  }

  // ── ambient dust overlay for storeroom ─────────────────────
  if (roomIdx === 0) {
    ctx.fillStyle = 'rgba(60,30,10,0.18)';
    ctx.fillRect(0, 0, canvas.width, GAME_H);
  }

  // ── footsteps ───────────────────────────────────────────────
  drawFootsteps();

  // ── click target border ──────────────────────────────────────
  if (clickTarget) {
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 2;
    ctx.strokeRect(clickTarget.x * TILE + 1, clickTarget.y * TILE + 1, TILE - 2, TILE - 2);
    ctx.lineWidth = 1;
  }

  // ── NPCs ────────────────────────────────────────────────────
  for (const npc of NPCS) {
    if (npc.room === roomIdx) drawNPC(npc);
  }

  // ── storeroom building label (village square) ────────────────
  if (roomIdx === 1) {
    const lx = 13 * TILE;  // col 13 = storeroom door
    const ly = 7 * TILE;   // row 7 = building top
    const label = 'Storeroom';
    ctx.font = 'bold 9px monospace';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(Math.round(lx - tw/2 - 3), ly - 16, Math.round(tw + 6), 13);
    ctx.fillStyle = '#ffeeaa';
    ctx.textAlign = 'center';
    ctx.fillText(label, lx, ly - 5);
    ctx.textAlign = 'left';
  }

  // ── Rowanoak Village sign ────────────────────────────────────
  if (roomIdx === 3) {
    const label = '🏘 Rowanoak Village';
    ctx.font = 'bold 13px monospace';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(Math.round(canvas.width/2 - tw/2 - 6), 8, Math.round(tw + 12), 22);
    ctx.fillStyle = '#ffeeaa';
    ctx.textAlign = 'center';
    ctx.fillText(label, canvas.width / 2, 24);
    ctx.textAlign = 'left';
  }

  // ── player ──────────────────────────────────────────────────
  drawKnight(player.pxX, player.pxY, player.facing, player.walkFrame);

  // ── interaction hints ────────────────────────────────────────
  if (!modalOpen) {
    if (isAdjacentToChest()) drawHint('Press [E] or click the chest to open it');
    const nearNpc = adjacentNpc();
    if (nearNpc) drawHint(`Press [E] to talk to ${nearNpc.name}`);
  }

  // ── door hints ──────────────────────────────────────────────
  if (!modalOpen) {
    const tile = room.map[player.tileY]?.[player.tileX];
    if (tile === T.DOOR_STORE && roomIdx === 0) drawHint('Exit ▼ to Village Square');
    if (tile === T.DOOR_STORE && roomIdx === 1) drawHint('Enter ★ Storeroom');
    if (tile === T.DOOR_R && roomIdx === 1)     drawHint('Enter → Rowanoak Village');
    if (tile === T.DOOR_L && roomIdx === 3)     drawHint('Enter ◀ Village Square');
    if (tile === T.DOOR_R && roomIdx === 3)     drawHint('Enter → Riverside Bridge');
    if (tile === T.DOOR_L && roomIdx === 4)     drawHint('Enter ◀ Rowanoak Village');
    if (tile === T.DOOR_U) drawHint('Enter ▲ Farmland');
    if (tile === T.DOOR_D) drawHint('Enter ▼ Village Square');
    if (tile === T.DOOR_FL && roomIdx === 2) drawHint('Enter ▲ Forest');
    if (tile === T.DOOR_FO && roomIdx === 5) drawHint('Enter ▼ Farmland');
    if (tile === T.DOOR_PL && roomIdx === 2) drawHint("Enter ▲ Planter's Farm");
    if (tile === T.DOOR_LP && roomIdx === 7) drawHint('Enter ▼ Farmland');
    if (tile === T.DOOR_DF && roomIdx === 5) drawHint('Enter ▼ Deep Forest');
    if (tile === T.DOOR_FD && roomIdx === 6) drawHint('Enter ▲ Forest');
  }

  // ── hotbar ──────────────────────────────────────────────────
  drawHotbar();

  // ── room name (top-left) ─────────────────────────────────────
  drawRoomName(room.name);

  // ── stats panel (right side) ────────────────────────────────
  updateSidebar();

  // ── fade overlay ────────────────────────────────────────────
  if (fade.active && fade.alpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fade.alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

// ================================================================
//  MAIN LOOP
// ================================================================

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── start ────────────────────────────────────────────────────────
canvas.setAttribute('tabindex', '0');
canvas.focus();
player.pxX = player.tileX * TILE;
player.pxY = player.tileY * TILE;
updateRegionImage();
requestAnimationFrame(loop);
</script>
