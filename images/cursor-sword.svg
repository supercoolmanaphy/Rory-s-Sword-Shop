<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Blade gradient: bright tip to silver -->
  <defs>
    <linearGradient id="bladeGrad" x1="5" y1="5" x2="31" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="guardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#6B3A2A"/>
    </linearGradient>
  </defs>

  <!-- Blade (silver steel) pointing upper-left, tip at (5,5) -->
  <!-- Blade polygon: dark outline so it's visible against light backgrounds -->
  <polygon
    points="5,5 9,6 31,25 24,32"
    fill="url(#bladeGrad)"
    stroke="#444444"
    stroke-width="0.8"
    stroke-linejoin="round"
  />

  <!-- Blade edge highlight -->
  <line x1="5" y1="5" x2="30" y2="24"
    stroke="rgba(255,255,255,0.85)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Crossguard (gold, perpendicular to blade at blade/handle junction) -->
  <line x1="34" y1="21" x2="20" y2="35"
    stroke="url(#guardGrad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Handle (leather-wrapped brown) -->
  <line x1="28" y1="28" x2="40" y2="40"
    stroke="url(#handleGrad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Handle wrap ridges -->
  <line x1="29.5" y1="30.5" x2="33" y2="33.5" stroke="rgba(0,0,0,0.25)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="33.5" x2="35.5" y2="36.5" stroke="rgba(0,0,0,0.25)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="34.5" y1="36.5" x2="38" y2="39" stroke="rgba(0,0,0,0.25)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Pommel (gold ball at end of handle) -->
  <circle cx="41.5" cy="41.5" r="3.8"
    fill="url(#guardGrad)" stroke="#8B6914" stroke-width="0.8"/>
</svg>
