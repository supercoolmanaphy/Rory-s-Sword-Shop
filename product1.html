<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bronze Short Sword</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .product-page {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .main-img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .gallery {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .gallery img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 5px;
    }

    .back {
      display: inline-block;
      margin-bottom: 15px;
      text-decoration: none;
      color: blue;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      margin-top: 10px;
      font-size: 16px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      resize: vertical;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back">← Back to Shop</a>

  <div class="product-page">
    <h1>Bronze Short Sword</h1>
    <img src="images/sword1.jpg" class="main-img">

    <p><strong>Price:</strong> $150.00</p>

    <label for="description"><strong>Product Description:</strong></label>
    <textarea id="description" placeholder="hiiiiiiii"></textarea>

    <h3>More Images</h3>
    <div class="gallery">
      <img src="images/sword1.jpg">
      <img src="images/sword1.jpg">
      <img src="images/sword1.jpg">
    </div>
  </div>
</div>

</body>
</html>
